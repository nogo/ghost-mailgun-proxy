[tools]
go = "1.26.4"

[env]
MODULE = "github.com/nogo/ghost-mailgun-proxy"
BINARY = "bin/ghost-mailgun-proxy"
IMAGE  = "ghcr.io/nogo/ghost-mailgun-proxy"

[tasks.build]
description = "Build the binary"
sources     = ["**/*.go", "go.mod", "go.sum", ".mise.toml"]
outputs     = ["bin/ghost-mailgun-proxy"]
run = """
go build -ldflags="-s -w" -o "$BINARY" .
"""

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf bin/"

[tasks.test]
description = "Run tests with race detector (no cache)"
run = "go test -race -count=1 ./..."

[tasks.vet]
description = "Run go vet"
sources = ["**/*.go", "go.mod"]
outputs = { auto = true }
run = "go vet ./..."

[tasks.fmt]
description = "Apply gofmt formatting"
run = "gofmt -w ."

[tasks."fmt:check"]
description = "Fail if any .go files are unformatted"
sources = ["**/*.go"]
outputs = { auto = true }
run = """
UNFORMATTED=$(gofmt -l .)
if [ -n "$UNFORMATTED" ]; then
    echo "FAIL: unformatted files:"
    echo "$UNFORMATTED"
    exit 1
fi
"""

[tasks.tidy]
description = "Check go.mod and go.sum are tidy"
run = """
go mod tidy
if [ -n "$(git diff --name-only go.mod go.sum 2>/dev/null)" ]; then
    echo "FAIL: go.mod/go.sum updated by tidy — commit the changes"
    exit 1
fi
"""

[tasks.lint]
description = "Run staticcheck (skipped if not installed)"
sources = ["**/*.go", "go.mod"]
outputs = { auto = true }
run = """
if command -v staticcheck >/dev/null 2>&1; then
    staticcheck ./...
else
    echo "staticcheck not installed, skipping"
fi
"""

[tasks.check]
description = "Full local verification: vet, fmt, tidy, test, lint"
depends = ["vet", "fmt:check", "tidy", "test", "lint"]
run = 'echo "All checks passed."'

[tasks."docker:build"]
description = "Build the container image locally"
sources     = ["Dockerfile", ".dockerignore", "**/*.go", "go.mod"]
run = 'docker build --pull -t "$IMAGE:local" .'

[tasks."docker:scan-config"]
description = "Scan Dockerfile and repository config with Trivy"
sources     = ["Dockerfile", ".dockerignore", ".github/**/*.yml", ".github/**/*.yaml"]
run = """
if command -v trivy >/dev/null 2>&1; then
    trivy config --exit-code 1 .
else
    echo "trivy not installed, skipping"
fi
"""

[tasks."docker:scan-image"]
description = "Scan the locally built container image with Trivy"
run = """
if command -v trivy >/dev/null 2>&1; then
    trivy image --exit-code 1 --severity HIGH,CRITICAL "$IMAGE:local"
else
    echo "trivy not installed, skipping"
fi
"""

[tasks."docker:check"]
description = "Build and scan the local container image"
depends = ["docker:scan-config", "docker:build", "docker:scan-image"]
run = 'echo "Docker checks passed."'
